version: '3.8'

services:
  # SQL Server 数据库
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mes-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD:?Set SA_PASSWORD in your environment or .env file}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - mes-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD:?Set SA_PASSWORD in your environment or .env file} -C -Q "SELECT 1"
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: mes-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in your environment or .env file} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # MES Web API
  mes-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mes-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MesDb;User Id=sa;Password=${SA_PASSWORD:?Set SA_PASSWORD in your environment or .env file};TrustServerCertificate=True;MultipleActiveResultSets=true
      - Redis__Enabled=true
      - Redis__ConnectionString=redis:6379,defaultDatabase=0,password=${REDIS_PASSWORD:?Set REDIS_PASSWORD in your environment or .env file}
      - Jwt__SecretKey=${JWT_SECRET:?Set JWT_SECRET in your environment or .env file}
      - Jwt__Issuer=Mes.Core.WebApi
      - Jwt__Audience=Mes.Client
      - Security__RequireHttps=false
      - HealthChecks__Enabled=true
    ports:
      - "5000:80"
    volumes:
      - mes-logs:/app/logs
      - mes-data:/app/data
    networks:
      - mes-network
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  mes-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
  redis-data:
    driver: local
  mes-logs:
    driver: local
  mes-data:
    driver: local
